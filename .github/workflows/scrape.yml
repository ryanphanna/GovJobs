name: Job Feed Scrape

on:
  schedule:
    - cron: '0 10 * * 0,3' # Run Sun and Wed at 6 AM EST (10 AM UTC)
  workflow_dispatch: # Allow manual runs

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: cd scraper && npm install

      - name: Install Playwright Browsers
        run: cd scraper && npx playwright install chromium --with-deps

      - name: Run Scraper
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_MODEL: "deepseek-chat"
        run: cd scraper && npx tsx scraper.ts

      - name: Run Parser
        env:
          TURSO_URL: ${{ secrets.TURSO_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          AI_MODEL: "deepseek-chat"
        run: cd scraper && npx tsx parser.ts
